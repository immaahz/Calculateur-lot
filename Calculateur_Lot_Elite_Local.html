<title>Calculateur de lot</title>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,215,0,0.08), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(255,215,0,0.05), transparent 40%),
        linear-gradient(180deg,#0a0a0a,#111);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card {
    width:100%;
    max-width:520px;
    background:linear-gradient(145deg,#111,#1a1a1a);
    border-radius:18px;
    padding:30px;
    box-shadow:0 0 60px rgba(255,215,0,0.08);
    border:1px solid rgba(255,215,0,0.15);
}

.logo {
    display:block;
    margin:0 auto 20px auto;
    width:180px;
}

h1 {
    text-align:center;
    color:gold;
    font-size:20px;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:10px;
    border:1px solid #333;
    background:#0f0f0f;
    color:white;
    font-size:16px;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#caa84c,#ffd700);
    font-weight:bold;
    font-size:16px;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    font-size:14px;
}

th,td {
    border:1px solid #333;
    padding:8px;
    text-align:center;
}

th {
    background:#1c1c1c;
    color:gold;
}

.highlight {
    background:#222;
    font-weight:bold;
}

.hidden { display:none; }

.note {
    font-size:12px;
    opacity:0.6;
    text-align:center;
    margin-top:10px;
}

</style>
</head>

<h1>Calculateur de lot</h1>

<form onsubmit="event.preventDefault(); calculate();">
<input type="text" id="capital" placeholder="Capital (€)" required>
<input type="text" id="entry" placeholder="Prix d'entrée (PE)" required>
<input type="text" id="sl" placeholder="Stop Loss (SL)" required>
<button type="submit">Calculer</button>
</form>

<div id="output"></div>
<div class="note">1 lot XAUUSD = 100$ par mouvement de 1$</div>
</div>

<script>

const ACCESS_PASSWORD = "ELITE2026";

function checkPassword(){
    const input = document.getElementById("password").value;
    if(input === ACCESS_PASSWORD){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("appBox").classList.remove("hidden");
    }
}

function clean(v){
    return parseFloat(v.replace(",", "."));
}

function calculate(){
    let capital = clean(document.getElementById("capital").value);
    let entry = clean(document.getElementById("entry").value);
    let sl = clean(document.getElementById("sl").value);

    if(isNaN(capital)||isNaN(entry)||isNaN(sl)) return;

    let distance = Math.abs(entry-sl);
    if(distance<=0) return;

    let risks=[1,1.5,2,3];
    let html="<table><tr><th>Lot</th><th>Risque %</th><th>Montant risqué (€)</th></tr>";

    risks.forEach(function(r){
        let riskAmount=capital*(r/100);
        let lot=riskAmount/(distance*100);
        let row=(r===1)?"class='highlight'":"";
        html+="<tr "+row+"><td>"+lot.toFixed(3)+"</td><td>"+r+"%</td><td>"+riskAmount.toFixed(2)+"</td></tr>";
    });

    html+="</table>";
    document.getElementById("output").innerHTML=html;
}

</script>

</body>
</html>
